<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>写真一覧</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, sans-serif; padding: 16px; color: #333; }
      h2 { font-size: 16px; margin-bottom: 12px; }
      .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .photo-card { border-radius: 8px; overflow: hidden; background: #fafafa; border: 1px solid #eee; }
      .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
      .photo-card .caption { font-size: 12px; color: #666; padding: 6px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .empty { text-align: center; color: #999; padding: 32px 0; font-size: 14px; }
      .loading { text-align: center; color: #1565c0; padding: 32px 0; font-size: 14px; }
      .error { text-align: center; color: #c62828; padding: 32px 0; font-size: 14px; }
    </style>
  </head>
  <body>
    <h2 id="title">写真一覧</h2>
    <div id="gallery" class="gallery"></div>
    <script type="module" src="/src/photo-viewer.ts"></script>
  </body>
</html>
